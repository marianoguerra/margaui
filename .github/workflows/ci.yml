name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run format-check

      - run: npm run check-sync

      - run: npm run check-tw-version

      - run: npm run smoke-test-tw-cli

      # committed generated artifacts must match their sources
      - run: npm run gen-vfs-dev && npm run gen-component-tree && npm run gen-theme-list && npm run gen-skill

      - run: git diff --exit-code

      # a release build must not dirty the tree
      - run: npm run dist

      - run: git diff --exit-code
