name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run check-sync

      - run: npm run check-tw-version

      - run: npm run smoke-test-tw-cli

      - run: npm run gen-vfs-dev
