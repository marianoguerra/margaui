name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: bun install

      - run: npm run check-sync

      - run: npm run smoke-test-tw-cli

      - run: npm run gen-vfs-dev
