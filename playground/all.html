<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>margaui — all components</title>
  <style id="page-styles"></style>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #all-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      padding-inline: 1.5rem;
      border-bottom: 1px solid var(--color-base-300);
      gap: 1rem;
    }
    #all-nav .all-title {
      flex: 1;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    #all-main {
      flex: 1;
      background: oklch(from var(--color-base-200) l c h / 0.4);
    }
    #all-content {
      max-width: 64rem;
      margin-inline: auto;
      padding: 2.5rem 2rem;
    }
    .all-heading {
      font-size: 2.25rem;
      line-height: 2.5rem;
      font-weight: 700;
      margin: 3rem 0 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-base-300);
      scroll-margin-top: 4rem;
    }
    .all-heading:first-child { margin-top: 0; }
    .all-subheading {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      opacity: 0.8;
      scroll-margin-top: 4rem;
    }
    .all-anchor {
      color: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: baseline;
      gap: 0.4em;
    }
    .all-hash {
      opacity: 0;
      transition: opacity 0.1s;
      font-weight: 400;
      color: var(--color-primary, currentColor);
    }
    .all-heading:hover .all-hash,
    .all-subheading:hover .all-hash,
    .all-anchor:focus-visible .all-hash {
      opacity: 0.6;
    }
    .all-preview {
      padding: 2rem;
      background: var(--color-base-100);
      border: 1px solid var(--color-base-300);
      border-radius: var(--radius-box, 0.5rem);
      margin-bottom: 1.5rem;
      /* Re-root `position: fixed` descendants (toast / fab / dock) to this
         box instead of the viewport. Any transform !== none works per spec. */
      transform: translateZ(0);
      min-height: 14rem;
    }
    .all-preview-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    preview-component {
      display: block;
      width: 100%;
    }
    #all-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem;
    }
  </style>
</head>
<body style="visibility: hidden" data-theme="light">
  <div id="app">
    <nav id="all-nav" class="navbar bg-base-100">
      <span class="all-title">margaui — all components</span>
      <a href="./" class="all-link" style="font-size:0.8125rem;opacity:0.7;text-decoration:underline">Playground</a>
      <select id="theme-select" class="select select-sm select-bordered"></select>
    </nav>
    <main id="all-main">
      <div id="all-loading">
        <span class="loading loading-spinner loading-lg"></span>
      </div>
      <div id="all-content"></div>
    </main>
  </div>

  <script type="module" src="all.js"></script>
</body>
</html>
